openapi: 3.0.3
info:
  description: This API provides event stats
  version: "1.0.0"
  title: Stats API
  contact:
    email: oabdelsalam@my.bcit.ca
paths:
  /stats:
    get:
      summary: Gets temperature and motion statistics
      operationId: app.get_stats
      description: Returns statistics for both temperature readings and motion readings
      responses:
        '200':
          description: Successfully returned a combined stats object
          content:
            application/json:
              schema:
                type: object
                properties:
                  temperature:
                    $ref: '#/components/schemas/TempStats'
                  motion:
                    $ref: '#/components/schemas/MotionStats'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

components:
  schemas:
    TempStats:
      required:
        - num_temp_readings
        - min_temp_celcius
        - max_temp_celcius
      properties:
        num_temp_readings:
          type: integer
          example: 500000
        min_temp_celcius:
          type: number
          example: -60
        max_temp_celcius:
          type: number
          example: 60
      type: object

    MotionStats:
      required:
        - num_motion_readings
        - min_animal_speed
        - max_animal_speed
      properties:
        num_motion_readings:
          type: integer
          example: 250000
        min_animal_speed:
          type: number
          description: Minimum recorded animal speed in m/s
          example: 0
        max_animal_speed:
          type: number
          description: Maximum recorded animal speed in m/s
          example: 15
      type: object
