services:
  receiver:
    build:
      context: .
      dockerfile: receiver/Dockerfile
    ports:
      - "8010:8010"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data     
  storage:
    build:
      context: .
      dockerfile: storage/Dockerfile
    # ports:
    #   - "8090:8090"
    depends_on:
          db:
            condition: service_healthy
          kafka:
            condition: service_healthy
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
  analyzer:
    build:
      context: .
      dockerfile: analyzer/Dockerfile
    ports:
      - "8025:8025"
    depends_on:
          db:
            condition: service_healthy
          kafka:
            condition: service_healthy
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
  processing:
    build:
      context: .
      dockerfile: processing/Dockerfile
    ports:
      - "8100:8100"
    depends_on:
          db:
            condition: service_healthy
          kafka:
            condition: service_healthy
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
     - 80:80
  zookeeper:
    image: wurstmeister/zookeeper
    volumes:
      - ./data:/data/zookeeper-data
  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    command: [start-kafka.sh]
    ports:
      - "9092:9092"
    environment:
      KAFKA_CREATE_TOPICS: "events:1:1" 
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_LISTENERS: INSIDE://:29092,OUTSIDE://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data/kafka-data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:29092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
  db:
    image: mysql:8.0
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 1
      MYSQL_USER: pyro
      MYSQL_PASSWORD: cynical
      MYSQL_DATABASE: slop
    ports:
      - "3306:3306"
    volumes:
        # Where our data will be persisted
        - my-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "pyro", "-p cynical"]
      interval: 10s
      timeout: 5s
      retries: 5
  # Defines a named volume
volumes:
  my-db:
