services:
  receiver:
    build:
      context: .
      dockerfile: receiver/Dockerfile
    environment:
      CORS_ALLOW_ALL: yes
    ports:
      - "8010:8010"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data     
  storage:
    build:
      context: .
      dockerfile: storage/Dockerfile
    environment:
      CORS_ALLOW_ALL: yes #change to yes if want to allow all request
    # ports:
    #   - "8090:8090"
    depends_on:
          db:
            condition: service_healthy
          kafka:
            condition: service_healthy
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
  analyzer:
    build:
      context: .
      dockerfile: analyzer/Dockerfile
    environment:
      CORS_ALLOW_ALL: yes
    ports:
      - "8025:8025"
    depends_on:
          db:
            condition: service_healthy
          kafka:
            condition: service_healthy
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
  processing:
    build:
      context: .
      dockerfile: processing/Dockerfile
    environment: 
      CORS_ALLOW_ALL: yes
    ports:
      - "8100:8100"
    depends_on:
          db:
            condition: service_healthy
          kafka:
            condition: service_healthy
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
  health-check:
    build:
      context: .
      dockerfile: healthchecker/Dockerfile
    ports:
      - "8120:8120"
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
      - ./healthchecker/health_status.json:/app/health_status.json
    restart: unless-stopped
      # dashboard:
      # build:
      # context: .
      # dockerfile: dashboard/Dockerfile
      # ports:
      #   - 80:80
  zookeeper:
    image: wurstmeister/zookeeper
    volumes:
      - ./data:/data/zookeeper-data
  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    command: [start-kafka.sh]
    ports:
      - "9092:9092"
    environment:
      KAFKA_CREATE_TOPICS: "events:1:1" 
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_LISTENERS: INSIDE://:29092,OUTSIDE://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data/kafka-data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:29092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
  db:
    image: mysql:8.0
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 1
      MYSQL_USER: pyro
      MYSQL_PASSWORD: cynical
      MYSQL_DATABASE: slop
    ports:
      - "3306:3306"
    volumes:
        # Where our data will be persisted
        - my-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "pyro", "-p cynical"]
      interval: 10s
      timeout: 5s
      retries: 5
  #Defines a named volume
  nginx:
     image: nginx:latest
     container_name: nginx-container
     ports:
       - "80:80"
     volumes:
       - ./dashboard:/usr/share/nginx/html
       - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
     depends_on:
       - receiver
       - analyzer
networks:
  app-network:    
volumes:
  my-db:
