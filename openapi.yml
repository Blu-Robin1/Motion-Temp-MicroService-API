openapi: 3.0.3
info:
  description: This API receives motion detection readings in form of pictures & recives temperature readings at the time of the detection
  version: "1.0.0"
  title: Motion & Temperature API
  contact:
    email: oabdelsalam@my.bcit.ca
paths:
  /motiontemp/temperature:
    post:
      summary: Reports a batch of temperature sensor readings
      operationId: app.report_temperature_readings
      description: Adds a batch of temperature readings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemperatureReadingBatch'
      responses:
        '201':
          description: batch successfully received
        '400':
          description: 'invalid input, object invalid'
    
  /motiontemp/motion:
    post:
      summary: Reports a batch of motion sensor readings
      operationId: app.report_motion_readings
      description: Adds a batch of motion readings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MotionReadingBatch'
      responses:
        '201':
          description: batch successfully received
        '400':
          description: 'invalid input, object invalid'

components:
  schemas:
    TemperatureReadingBatch:
      required:
      - station_id
      - station_name
      - reporting_timestamp
      - readings
      properties:
        station_id:
          type: string
          format: uuid
          example: "539bf232-6bba-4553-8c0f-1ccfd2ff5c7d"
        station_name:
          type: string
          example: "Churchill River Upland Ecoregion"
        reporting_timestamp:
          type: string
          format: date-time
          example: "2019-01-29T09:1:33.001Z"
        readings:
          type: array
          items:
            $ref: '#/components/schemas/TemperatureReading'
      type: object
    TemperatureReading:
      required:
        - temperature_celsius
        - recorded_timestamp
      properties:
        temperature_celsius:
          type: number
          example: -18
        recorded_timestamp:
          type: string
          format: date-time
          example: "2019-01-29T09:1:33.001Z"
      type: object

    MotionReadingBatch:
      required:
      - station_id
      - station_name
      - station_location
      - reporting_timestamp
      - readings
      properties:
        station_id:
          type: string
          format: uuid
          example: "dc73bb90-ee3c-4a7b-b151-d09edbde4e32"
        station_name:
          type: string
          example: "Churchill River Upland Ecoregion"
        station_location:
          type: string
          description: GPS location in degrees-minutes-seconds (DMS) format
          example: "45° 46' 52\" N 108° 30' 14\" W"
        reporting_timestamp:
          type: string
          format: date-time
          example: "2019-01-29T09:1:33.001Z"
        readings:
          type: array
          items:
            $ref: '#/components/schemas/MotionReading'
            
    MotionReading:
      required:
        - picture
        - animal_speed
        - recorded_timestamp
      properties:
        picture:
          type: string
          example: motion-detected-1-33.jpg
        animal_speed:
          type: integer
          description: units m/s
          example: 4
        recorded_timestamp:
          type: string
          format: date-time
          example: "2019-01-29T09:1:33.001Z"
      type: object